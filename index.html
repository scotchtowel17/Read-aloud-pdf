<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Read Aloud</title>

<!-- Installable web app / iOS home screen -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2f6f6a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Read Aloud">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<script>try{var _t=localStorage.getItem("theme");if(_t)document.documentElement.dataset.theme=_t;}catch(e){}</script>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://huggingface.co" crossorigin>
<link rel="dns-prefetch" href="https://cdn-lfs.huggingface.co">

<style>
  :root{
    --ink:#1a1712; --ink-soft:#6b6357; --paper:#faf7f0; --panel:#ffffff; --line:#e4ddcf;
    --accent:#2f6f6a; --accent-ink:#173a37; --accent-fill:#2f6f6a;
    --header-bg:rgba(250,247,240,.92); --chip-bg:rgba(255,255,255,.92); --tip-bg:#1a1712; --tip-ink:#ffffff; --drop-hot:#f2fbf9;
    --mark:rgba(238,182,63,.42); --mark-line:rgba(214,150,20,.9);
    --shadow:0 1px 2px rgba(26,23,18,.06), 0 8px 24px rgba(26,23,18,.08);
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
    --safe-l:env(safe-area-inset-left); --safe-r:env(safe-area-inset-right);
  }
  @media (prefers-color-scheme: dark){ :root:not([data-theme="light"]){
    --ink:#ece7db; --ink-soft:#9c9385; --paper:#15120d; --panel:#211c16; --line:#352d22;
    --accent:#63c1b6; --accent-ink:#245f58; --accent-fill:#2f8079;
    --mark:rgba(238,182,63,.30); --mark-line:rgba(240,190,70,.85);
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 10px 30px rgba(0,0,0,.55);
    --header-bg:rgba(21,18,13,.9); --chip-bg:rgba(33,28,22,.94); --tip-bg:#2f2a22; --tip-ink:#f5f1e6; --drop-hot:#12312c;
  } }
  :root[data-theme="dark"]{
    --ink:#ece7db; --ink-soft:#9c9385; --paper:#15120d; --panel:#211c16; --line:#352d22;
    --accent:#63c1b6; --accent-ink:#245f58; --accent-fill:#2f8079;
    --mark:rgba(238,182,63,.30); --mark-line:rgba(240,190,70,.85);
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 10px 30px rgba(0,0,0,.55);
    --header-bg:rgba(21,18,13,.9); --chip-bg:rgba(33,28,22,.94); --tip-bg:#2f2a22; --tip-ink:#f5f1e6; --drop-hot:#12312c;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;-webkit-text-size-adjust:100%;
    font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--paper);display:flex;flex-direction:column;
  }
  header{
    position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:calc(10px + var(--safe-t)) calc(16px + var(--safe-r)) 10px calc(16px + var(--safe-l));
    background:var(--header-bg);backdrop-filter:saturate(1.2) blur(8px);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:2px}
  .brand b{font-size:15px;letter-spacing:.2px}
  .brand span{font-size:12px;color:var(--ink-soft)}
  .spacer{flex:1 1 auto}
  button, .filebtn{
    font:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:9px 13px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;-webkit-tap-highlight-color:transparent;
    transition:border-color .15s, background .15s, transform .05s;touch-action:manipulation;
  }
  button:hover,.filebtn:hover{border-color:#cfc6b4}
  button:active,.filebtn:active{transform:translateY(1px)}
  button:disabled{opacity:.45;cursor:not-allowed}
  button.primary{background:var(--accent-fill);border-color:var(--accent-fill);color:#fff}
  button.primary:hover{background:var(--accent-ink);border-color:var(--accent-ink)}
  button:focus-visible,.filebtn:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  input[type=file]{display:none}
  .iconbtn{padding:9px 10px}
  .iconbtn svg{display:block}
  .ctl{display:flex;align-items:center;gap:8px}
  .ctl label{font-size:12px;color:var(--ink-soft)}
  select{font:inherit;font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;max-width:44vw}
  input[type=range]{accent-color:var(--accent);width:118px;height:26px}
  .rateval{font-variant-numeric:tabular-nums;font-size:12px;color:var(--ink-soft);width:34px;text-align:right}
  .ic{width:12px;height:12px;display:inline-block;position:relative}
  .ic-play{width:0;height:0;border-left:11px solid currentColor;border-top:7px solid transparent;border-bottom:7px solid transparent}
  .ic-pause::before,.ic-pause::after{content:"";position:absolute;top:0;width:4px;height:13px;background:currentColor;border-radius:1px}
  .ic-pause::before{left:1px}.ic-pause::after{left:8px}
  .ic-stop{width:12px;height:12px;background:currentColor;border-radius:2px}
  main{flex:1 1 auto;overflow:auto;position:relative;-webkit-overflow-scrolling:touch}
  .stage{max-width:920px;margin:0 auto;padding:22px calc(14px + var(--safe-r)) calc(130px + var(--safe-b)) calc(14px + var(--safe-l))}
  .drop{max-width:640px;margin:7vh auto;padding:40px 26px;text-align:center;border:1.5px dashed #cdbf9f;border-radius:18px;background:var(--panel);transition:border-color .15s, background .15s}
  .drop.hot{border-color:var(--accent);background:var(--drop-hot)}
  .drop h1{margin:0 0 6px;font-size:21px;letter-spacing:-.2px}
  .drop p{margin:0 auto 20px;max-width:44ch;color:var(--ink-soft);line-height:1.5;font-size:14px}
  .page{position:relative;margin:0 auto 18px;box-shadow:var(--shadow);border-radius:6px;background:#fff;overflow:hidden;width:max-content;max-width:100%}
  .page canvas{display:block;max-width:100%;height:auto}
  .layer{position:absolute;inset:0;cursor:pointer}
  .layer .hl{position:absolute;background:var(--mark);border-radius:3px;box-shadow:inset 0 -2px 0 var(--mark-line);pointer-events:none}
  .pagenum{position:absolute;top:8px;right:10px;font-size:11px;color:var(--ink-soft);background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:20px;padding:2px 9px;pointer-events:none}
  .notext{position:absolute;left:50%;top:14px;transform:translateX(-50%);font-size:12px;color:#8a5a00;background:#fff6e2;border:1px solid #f0dfab;border-radius:20px;padding:3px 12px;pointer-events:none}
  .toast{position:fixed;left:50%;bottom:calc(26px + var(--safe-b));transform:translateX(-50%);background:var(--tip-bg);color:var(--tip-ink);font-size:13px;padding:10px 16px;border-radius:10px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40;max-width:88vw;text-align:center}
  .toast.show{opacity:.96}
  .loading{display:flex;align-items:center;gap:10px;justify-content:center;color:var(--ink-soft);font-size:14px;padding:40px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite ease-in-out}
  @keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  .hint{position:fixed;left:50%;bottom:calc(20px + var(--safe-b));transform:translateX(-50%);font-size:12.5px;color:var(--ink-soft);background:var(--chip-bg);border:1px solid var(--line);border-radius:20px;padding:7px 14px;box-shadow:var(--shadow);z-index:15;max-width:88vw;text-align:center}
  .hint b{color:var(--accent)}
  #mode.on{background:var(--accent-fill);border-color:var(--accent-fill);color:#fff}
  .neuralbar{position:fixed;left:50%;bottom:calc(64px + var(--safe-b));transform:translateX(-50%);display:none;align-items:center;gap:10px;background:var(--tip-bg);color:var(--tip-ink);font-size:13px;padding:11px 16px;border-radius:11px;box-shadow:var(--shadow);z-index:50;max-width:90vw}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  @media (max-width:520px){
    .brand span{display:none}
    header{gap:8px;padding-top:calc(8px + var(--safe-t))}
    .filebtn,button{padding:9px 11px}
    select{max-width:38vw}
    input[type=range]{width:92px}
  }
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<header>
  <div class="brand"><b>Read Aloud</b><span>tap text to listen, works offline</span></div>
  <label class="filebtn" for="file" title="Open a PDF">
    <svg class="ic" aria-hidden="true" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h9l3 3h4v13H4z"/></svg>
    Open PDF
  </label>
  <input type="file" id="file" accept="application/pdf" aria-label="Choose a PDF file">
  <div class="spacer"></div>
  <button id="play" class="primary" disabled title="Play / Pause" aria-label="Play" aria-keyshortcuts="Space"><i class="ic ic-play" aria-hidden="true"></i><span id="playlbl">Play</span></button>
  <button id="stop" disabled title="Stop" aria-label="Stop"><i class="ic ic-stop" aria-hidden="true"></i>Stop</button>
  <button id="mode" title="Switch between the instant system voice and the natural on-device voice" aria-pressed="false">Voice: System</button>
  <div class="ctl">
    <label for="rate">Speed</label>
    <input type="range" id="rate" min="0.6" max="1.8" step="0.1" value="1" aria-label="Reading speed" aria-valuetext="1.0x">
    <span class="rateval" id="rateval">1.0x</span>
  </div>
  <div class="ctl">
    <label for="voice">Voice</label>
    <select id="voice" title="Reading voice" aria-label="Reading voice"></select>
  </div>
  <button id="theme" class="iconbtn" title="Toggle light / dark theme" aria-label="Toggle dark mode"></button>
</header>

<main id="main">
  <div class="stage" id="stage">
    <div class="drop" id="drop">
      <h1>Open a PDF to begin</h1>
      <p>Tap <b>Open PDF</b>, choose a file, then tap anywhere on a page. It reads from that spot and keeps going, highlighting each line. Tap another spot to jump. Everything runs on your device, no connection needed.</p>
      <label class="filebtn" for="file">Choose a file</label>
    </div>
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div id="sr" class="sr-only" role="status" aria-live="polite"></div>

<!-- application logic -->
<script>
"use strict";
window.__startApp = function(){
  const pdfjsLib = window.pdfjsLib;

  const els = {
    file: document.getElementById("file"),
    stage: document.getElementById("stage"),
    drop: document.getElementById("drop"),
    main: document.getElementById("main"),
    play: document.getElementById("play"),
    playlbl: document.getElementById("playlbl"),
    stop: document.getElementById("stop"),
    rate: document.getElementById("rate"),
    rateval: document.getElementById("rateval"),
    voice: document.getElementById("voice"),
    toast: document.getElementById("toast"),
    mode: document.getElementById("mode"),
    sr: document.getElementById("sr"),
    theme: document.getElementById("theme"),
  };

  const S = { pages:[], queue:[], idx:0, playing:false, paused:false, rate:1, voice:null, utter:null, curBoxes:[], _voices:[], mode:"system", neuralVoice:null };
  const NE = { tts:null, ctx:null, src:null, run:0, playIdx:0, loading:false };
  const sleep = (ms)=> new Promise(r=>setTimeout(r,ms));
  function saveSet(k,v){ try{ if(v==null) localStorage.removeItem(k); else localStorage.setItem(k,v); }catch(e){} }
  function getSet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  async function detectWebGPU(){ try{ if(!navigator.gpu) return false; const a=await navigator.gpu.requestAdapter(); return !!a; }catch(e){ return false; } }
  async function importKokoro(){
    const urls=["https://cdn.jsdelivr.net/npm/kokoro-js@1/+esm","https://cdn.jsdelivr.net/npm/kokoro-js@1/dist/kokoro.web.js"];
    let last;
    for(const u of urls){ try{ const m=await import(u); const K=m.KokoroTTS||m.default; if(K) return K; }catch(e){ last=e; } }
    throw last || new Error("Could not load the natural voice library.");
  }
  const synth = window.speechSynthesis;
  try{ if(navigator.storage && navigator.storage.persist){ navigator.storage.persist(); } }catch(e){}
  const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && (navigator.maxTouchPoints||0) > 1);
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const MAX_CHUNK = IS_IOS ? 420 : 240;   // iOS reads long utterances cleanly; other engines can cut past ~15s

  if(!synth){ toast("This browser has no speech engine."); }

  // ---------------- Voices (prefer smoother, offline-capable ones) ----------------
  function isEnhanced(v){ return /(enhanced|premium|neural|natural|siri)/i.test(v.name||""); }
  function voiceScore(v){
    let s=0;
    if(isEnhanced(v)) s+=100;
    if(v.localService) s+=15;                                   // local = works offline
    if((v.lang||"").toLowerCase().startsWith("en")) s+=50;
    if(/en[-_]us/i.test(v.lang||"")) s+=5;
    return s;
  }
  function labelVoice(v){ return (v.name||"Voice")+" ("+v.lang+")"+(isEnhanced(v)?"  *":""); }
  function loadVoices(){
    const list = synth ? synth.getVoices() : [];
    if(!list.length) return;
    list.sort((a,b)=> voiceScore(b)-voiceScore(a) || (a.name||"").localeCompare(b.name||""));
    els.voice.innerHTML="";
    list.forEach((v,i)=>{ const o=document.createElement("option"); o.value=String(i); o.textContent=labelVoice(v); els.voice.appendChild(o); });
    S._voices=list;
    if(!S.voice){ const _sv=getSet("ra_voice"); let _i=_sv?list.findIndex(v=>v.name===_sv):-1; if(_i<0)_i=0; S.voice=list[_i]; els.voice.value=String(_i); }
  }
  if(synth){ synth.onvoiceschanged=loadVoices; loadVoices(); }
  els.voice.addEventListener("change", ()=>{
    if(S.mode==="neural"){
      S.neuralVoice = els.voice.value || S.neuralVoice;
      saveSet("ra_nvoice", S.neuralVoice);
      if(S.playing && !S.paused) speakNeuralFrom(NE.playIdx);   // apply the new voice immediately
    } else {
      S.voice = S._voices[+els.voice.value] || null;
      if(S.voice) saveSet("ra_voice", S.voice.name);
    }
  });

  els.rate.addEventListener("input", ()=>{
    S.rate=parseFloat(els.rate.value);
    els.rateval.textContent=S.rate.toFixed(1)+"x";
    els.rate.setAttribute("aria-valuetext", S.rate.toFixed(1)+"x");
    saveSet("ra_rate", els.rate.value);
    if(S.playing && !S.paused){
      if(S.mode==="neural"){ speakNeuralFrom(NE.playIdx); }
      else if(synth){ synth.cancel(); speakNext(); }
    }
  });
  (function(){ const _r=getSet("ra_rate"); if(_r!=null){ els.rate.value=_r; S.rate=parseFloat(_r)||1; els.rateval.textContent=S.rate.toFixed(1)+"x"; els.rate.setAttribute("aria-valuetext",S.rate.toFixed(1)+"x"); } })();

  let toastT;
  function toast(msg){ els.toast.textContent=msg; els.toast.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>els.toast.classList.remove("show"),2900); }
  function announce(msg){ if(els.sr) els.sr.textContent=msg; }   // screen-reader-only status updates
  // ---------------- Theme (light / dark / follow system) ----------------
  const themeMeta = document.querySelector('meta[name="theme-color"]');
  const ICON_SUN='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  const ICON_MOON='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  function effectiveTheme(){ return document.documentElement.dataset.theme || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"); }
  function paintTheme(){ const dark=effectiveTheme()==="dark"; if(els.theme){ els.theme.innerHTML=dark?ICON_SUN:ICON_MOON; els.theme.setAttribute("aria-label", dark?"Switch to light theme":"Switch to dark theme"); } if(themeMeta) themeMeta.setAttribute("content", dark?"#15120d":"#2f6f6a"); }
  if(els.theme){ els.theme.addEventListener("click", ()=>{ const next=effectiveTheme()==="dark"?"light":"dark"; document.documentElement.dataset.theme=next; try{ localStorage.setItem("theme",next); }catch(e){} paintTheme(); announce(next==="dark"?"Dark theme":"Light theme"); }); }
  try{ matchMedia("(prefers-color-scheme: dark)").addEventListener("change", ()=>{ if(!document.documentElement.dataset.theme) paintTheme(); }); }catch(e){}
  paintTheme();

  els.file.addEventListener("change", e=>{ const f=e.target.files&&e.target.files[0]; if(f) openFile(f); });
  ["dragenter","dragover"].forEach(ev=>document.addEventListener(ev,e=>{ e.preventDefault(); els.drop&&els.drop.classList.add("hot"); }));
  ["dragleave","drop"].forEach(ev=>document.addEventListener(ev,e=>{ e.preventDefault(); els.drop&&els.drop.classList.remove("hot"); }));
  document.addEventListener("drop",e=>{ const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0]; if(f&&f.type==="application/pdf") openFile(f); else if(f) toast("That is not a PDF file."); });

  // ---------------- Text normalization ----------------
  // Per-character folding, applied at item level so highlight offsets stay aligned.
  function normChars(s){
    return s.normalize("NFKC")
      .replace(/\u00AD/g,"")                                   // soft hyphen
      .replace(/[\u2010\u2011]/g,"-")                          // unicode hyphens -> ascii (enables de-hyphenation)
      .replace(/[\u2018\u2019\u201B\u2032]/g,"'")              // curly / prime -> apostrophe
      .replace(/[\u201C\u201D\u2033]/g,'"')                    // curly double -> quote
      .replace(/\u2026/g,"...")                                // ellipsis
      .replace(/[\u2013\u2014\u2015]/g,", ")                   // en / em / bar dash -> pause
      .replace(/[\u2022\u25AA\u2023\u25E6\u00B7\u2043]/g,", ") // bullets -> pause
      .replace(/\u00A7\u00A7/g," sections ").replace(/\u00A7/g," section ")
      .replace(/\u00B6/g," paragraph ")
      .replace(/&/g," and ");
  }
  // Word-level expansions, applied only to spoken text (never to the highlight map).
  function expandWords(s){
    return s
      .replace(/\bNo\.\s*(?=\d)/g,"Number ")
      .replace(/\bNos\.\s*(?=\d)/g,"Numbers ")
      .replace(/(\s|^)v\.(\s)/g,"$1versus$2")                  // case names
      .replace(/\be\.?\s?g\.\,?/gi,"for example,")
      .replace(/\bi\.?\s?e\.\,?/gi,"that is,")
      .replace(/\bet\s+al\.?/gi,"and others")
      .replace(/\betc\./gi,"et cetera")
      .replace(/\bcf\./gi,"compare")
      .replace(/\bviz\./gi,"namely")
      .replace(/\bapprox\./gi,"approximately")
      .replace(/\s+([,;:.!?])/g,"$1")                          // no space before punctuation
      .replace(/,(?:\s*,)+/g,",")                              // collapse repeated commas
      .replace(/\s{2,}/g," ")
      .trim();
  }

  const ABBR = new Set(["mr","mrs","ms","dr","prof","st","ave","blvd","rd","jr","sr","inc","corp","co","ltd","llc","llp","no","nos","vs","v","dept","fig","figs","pp","para","paras","cir","ed","eds","vol","al","etc","eg","ie","cf","viz","approx","dist","ct","sec","art","ch","apt","mt","gov","sen","rep","hon","esq","fed","civ","crim","proc","evid","app","supp","stat","const","amend","ann","rev","reg","regs","tit","subch","div","jan","feb","mar","apr","jun","jul","aug","sep","sept","oct","nov","dec"]);

  // ---------------- Geometry ----------------
  function itemRect(it,viewport){
    const m=pdfjsLib.Util.transform(viewport.transform,it.transform);
    const h=Math.hypot(m[1],m[3]) || 1;
    const w=(it.width||0)*viewport.scale;
    return { x:m[4], y:m[5]-h, w:Math.max(w,2), h:h };
  }

  // group text items into visual lines (single-column reconstruction)
  function groupLines(items){
    const arr=items.slice().sort((a,b)=> a.y-b.y || a.x-b.x);
    const lines=[];
    for(const it of arr){
      const top=it.y, bot=it.y+it.h, cy=(top+bot)/2;
      const ln=lines.length?lines[lines.length-1]:null;
      if(ln && Math.abs(cy-ln.cy) <= Math.max(ln.h,it.h)*0.5){
        ln.items.push(it); ln.top=Math.min(ln.top,top); ln.bot=Math.max(ln.bot,bot); ln.h=ln.bot-ln.top; ln.cy=(ln.top+ln.bot)/2;
      } else {
        lines.push({items:[it], top, bot, h:bot-top, cy});
      }
    }
    for(const ln of lines){ ln.items.sort((a,b)=> a.x-b.x); ln.y=ln.top; ln.raw=ln.items.map(i=>i.str).join(" ").trim(); }
    return lines;
  }

  // ---------------- Running header / footer detection (cross-page) ----------------
  function sig(s){ return s.toLowerCase().replace(/\s+/g," ").replace(/\d+/g,"#").trim(); }
  function detectRunning(pageData){
    const firsts={}, lasts={};
    for(const p of pageData){
      if(!p.lines.length) continue;
      const f=sig(p.lines[0].raw), l=sig(p.lines[p.lines.length-1].raw);
      if(f) firsts[f]=(firsts[f]||0)+1;
      if(l) lasts[l]=(lasts[l]||0)+1;
    }
    const N=pageData.length, thr=Math.max(2, Math.ceil(N*0.4));
    const H=new Set(Object.keys(firsts).filter(k=>k.length<=90 && firsts[k]>=thr));
    const F=new Set(Object.keys(lasts).filter(k=>k.length<=90 && lasts[k]>=thr));
    return {H,F};
  }
  function isPageNumberLine(t){
    t=t.trim();
    return /^(page\s+)?[0-9]{1,4}$/i.test(t) || /^[ivxlcdm]{1,7}$/i.test(t) || /^[-\u2013\u2014]\s*\d+\s*[-\u2013\u2014]$/.test(t);
  }
  function keepLines(lines, pageH, run){
    if(!lines.length) return lines;
    const topBand=pageH*0.10, botBand=pageH*0.88;
    return lines.filter(ln=>{
      const inTop=ln.y<topBand, inBot=ln.top>botBand;
      const s=sig(ln.raw);
      if(inTop && run.H.has(s)) return false;
      if(inBot && run.F.has(s)) return false;
      if((inTop||inBot) && isPageNumberLine(ln.raw)) return false;
      return true;
    });
  }

  // ---------------- Build clean text + offset map (for highlight) ----------------
  function buildText(lines){
    let text=""; const map=[];
    let prevBottom=null, prevH=null;
    for(let li=0; li<lines.length; li++){
      const ln=lines[li];
      if(li>0){
        const gapAbove = prevBottom==null ? 0 : (ln.y - prevBottom);
        const paraBreak = prevBottom!=null && gapAbove > prevH*0.9;
        if(paraBreak){ text+="\n"; }
        else{
          const m=text.match(/([A-Za-z])\-$/);                 // line-end hyphenation
          if(m && /^[a-z]/.test(ln.raw)){ text=text.slice(0,-1); } // join word, drop hyphen
          else if(!/\s$/.test(text)){ text+=" "; }
        }
      }
      for(let k=0;k<ln.items.length;k++){
        const it=ln.items[k];
        if(k>0){
          const prev=ln.items[k-1];
          const gap=it.x-(prev.x+prev.w);
          if(gap > it.h*0.25 && !/\s$/.test(text) && !/^\s/.test(it.str)) text+=" ";
        }
        const start=text.length; text+=it.str; const end=text.length;
        map.push({start,end,rect:{x:it.x,y:it.y,w:it.w,h:it.h}});
      }
      prevBottom=ln.bot; prevH=ln.h;
    }
    return {text, map};
  }

  // ---------------- Sentence segmentation (abbreviation-aware, whole sentences) ----------------
  function lastWord(text,upto){ let j=upto-1; while(j>=0 && /[A-Za-z]/.test(text[j])) j--; return text.slice(j+1,upto); }
  function segment(text){
    const n=text.length; const first=[]; let start=0, i=0;
    const isTerm=c=> c==="."||c==="!"||c==="?";
    while(i<n){
      const c=text[i]; let boundary=false;
      if(c==="\n"){ boundary=true; }
      else if(isTerm(c)){
        let j=i+1; while(j<n && "!?.)\"'\u201d".indexOf(text[j])>=0) j++;
        const followsSpace = j>=n || /\s/.test(text[j]);
        let k=j; while(k<n && /\s/.test(text[k])) k++; const nextNon = k<n?text[k]:"";
        const before = i>0?text[i-1]:"";
        const nextRaw = j<n?text[j]:"";
        const isDecimal = c==="." && /\d/.test(before) && /\d/.test(nextRaw);
        let isAbbr=false;
        if(c==="."){
          const w=lastWord(text,i);
          if(w && ABBR.has(w.toLowerCase())) isAbbr=true;
          if(w.length===1 && /[A-Z]/.test(w)) isAbbr=true;     // initials: J. Smith
        }
        if(followsSpace && !isDecimal && !isAbbr){
          const startsNew = nextNon==="" || /[A-Z0-9"'\u201c(\[\u2014\-]/.test(nextNon);
          if(startsNew){ i=j-1; boundary=true; }
        }
      }
      i++;
      if(boundary){ if(text.slice(start,i).trim()) first.push({start,end:i}); start=i; }
    }
    if(text.slice(start,n).trim()) first.push({start,end:n});

    // split only over-long sentences, at clause punctuation, so prosody stays intact
    const out=[];
    for(const s of first){
      if(s.end-s.start <= MAX_CHUNK){ out.push(s); continue; }
      let a=s.start;
      while(a<s.end){
        let b=Math.min(a+MAX_CHUNK, s.end);
        if(b<s.end){
          let cut=-1;
          for(let k=b;k>a+60;k--){ const ch=text[k]; if(ch===";"||ch===":"||ch===","){ cut=k+1; break; } }
          if(cut>a){ b=cut; }
          else { let k=b; while(k>a+60 && !/\s/.test(text[k])) k--; if(k>a+60) b=k; }
        }
        if(b<=a) b=Math.min(a+MAX_CHUNK, s.end);
        if(b<=a) break;
        out.push({start:a,end:b}); a=b;
      }
    }
    return out;
  }

  function mergeRects(a,b,map){
    const hit=map.filter(m=> m.start<b && m.end>a).map(m=>m.rect);
    if(!hit.length) return [];
    hit.sort((p,q)=> p.y-q.y || p.x-q.x);
    const lines=[]; let cur=null;
    for(const r of hit){
      if(cur && Math.abs(r.y-cur.y) <= cur.h*0.6){
        const right=Math.max(cur.x+cur.w, r.x+r.w);
        cur.x=Math.min(cur.x,r.x); cur.w=right-cur.x; cur.h=Math.max(cur.h,r.h); cur.y=Math.min(cur.y,r.y);
      } else { cur={x:r.x,y:r.y,w:r.w,h:r.h}; lines.push(cur); }
    }
    return lines.map(o=>({x:o.x-1,y:o.y-1,w:o.w+2,h:o.h+3}));
  }

  // ---------------- Load / render ----------------
  async function openFile(file){
    stopReading(); S.pages=[]; S.queue=[]; S.docKey="pos_"+file.name+"_"+file.size;
    els.stage.innerHTML='<div class="loading"><span class="dot"></span>Rendering '+escapeHtml(file.name)+'</div>';
    try{
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      els.stage.innerHTML="";
      const targetW=Math.min((els.main.clientWidth||900)-28,900);

      // Pass 1: render + collect line geometry
      const pageData=[];
      for(let n=1;n<=pdf.numPages;n++){
        const page=await pdf.getPage(n);
        const base=page.getViewport({scale:1});
        const scale=Math.max(0.5,Math.min(targetW/base.width,2.2));
        const viewport=page.getViewport({scale});

        const wrap=document.createElement("div"); wrap.className="page";
        const canvas=document.createElement("canvas");
        canvas.width=Math.floor(viewport.width*DPR); canvas.height=Math.floor(viewport.height*DPR);
        canvas.style.width=viewport.width+"px"; canvas.style.height=viewport.height+"px";
        wrap.appendChild(canvas);
        const overlay=document.createElement("div"); overlay.className="layer"; wrap.appendChild(overlay);
        const tag=document.createElement("div"); tag.className="pagenum"; tag.textContent="Page "+n+" / "+pdf.numPages; wrap.appendChild(tag);
        els.stage.appendChild(wrap);

        await page.render({ canvasContext:canvas.getContext("2d"), viewport, transform: DPR!==1?[DPR,0,0,DPR,0,0]:null }).promise;

        const tc=await page.getTextContent();
        const items=[];
        for(const it of tc.items){
          const s=normChars(it.str||"");
          if(!s.trim()) continue;
          const r=itemRect(it,viewport);
          items.push({str:s, x:r.x, y:r.y, w:r.w, h:r.h});
        }
        const lines=groupLines(items);
        pageData.push({overlay, wrap, lines, pageH:viewport.height, logicalW:viewport.width, logicalH:viewport.height});
      }

      // detect repeated headers / footers across the document
      const run=detectRunning(pageData);

      // Pass 2: clean text -> sentences -> queue
      for(const pd of pageData){
        const kept=keepLines(pd.lines, pd.pageH, run);
        const {text, map}=buildText(kept);
        const sents=segment(text);
        const sentences=[];
        for(const s of sents){
          const spoken=expandWords(text.slice(s.start,s.end));
          if(!spoken) continue;
          sentences.push({ spoken, startChar:s.start, rects:mergeRects(s.start,s.end,map) });
        }
        const pageObj={ overlay:pd.overlay, logicalW:pd.logicalW, logicalH:pd.logicalH, map, sentences };
        if(!sentences.length && !kept.length){
          const note=document.createElement("div"); note.className="notext"; note.textContent="No selectable text on this page"; pd.wrap.appendChild(note);
        }
        S.pages.push(pageObj);
        pd.overlay.addEventListener("click", ev=>{
          const r=pd.overlay.getBoundingClientRect();
          const sx=pageObj.logicalW/(pd.overlay.offsetWidth||pageObj.logicalW);
          const sy=pageObj.logicalH/(pd.overlay.offsetHeight||pageObj.logicalH);
          onPageClick(pageObj, (ev.clientX-r.left)*sx, (ev.clientY-r.top)*sy);
        });
      }

      buildQueue();
      updateControls();   // enable Play as soon as the queue is ready (start from the top without tapping first)
      if(!S.queue.length){ toast("Loaded, but no selectable text. A scanned PDF needs OCR first."); }
      else {
        const _pos=parseInt(getSet(S.docKey)||"",10);
        if(_pos>0 && _pos<S.queue.length){ S.idx=_pos; highlight(S.queue[_pos]); toast("Resumed where you left off \u2014 press Play"); }
        else showHint();
      }
    }catch(err){
      console.error(err);
      els.stage.innerHTML='<div class="drop"><h1>Could not open that file</h1><p>'+escapeHtml(err.message||String(err))+'</p><label class="filebtn" for="file">Try another file</label></div>';
    }
  }

  function buildQueue(){
    S.queue=[];
    S.pages.forEach(p=>{ p.sentences.forEach((s,local)=>{ S.queue.push({page:p, local, spoken:s.spoken, rects:s.rects, startChar:s.startChar}); }); });
  }

  function onPageClick(pageObj,x,y){
    if(!pageObj.sentences.length){ toast("No text to read on this page."); return; }
    let best=-1,bestD=Infinity;
    for(let k=0;k<pageObj.map.length;k++){
      const r=pageObj.map[k].rect;
      const cx=Math.max(r.x,Math.min(x,r.x+r.w)), cy=Math.max(r.y,Math.min(y,r.y+r.h));
      const d=(x-cx)*(x-cx)+(y-cy)*(y-cy);
      if(d<bestD){bestD=d;best=k;}
    }
    const charPos=best>=0?pageObj.map[best].start:0;
    let local=0;
    for(let s=0;s<pageObj.sentences.length;s++){ if(pageObj.sentences[s].startChar<=charPos) local=s; else break; }
    const gi=S.queue.findIndex(q=>q.page===pageObj && q.local===local);
    if(gi>=0) startFrom(gi);
  }

  // ---------------- Speech engine ----------------
  let keepAlive=null;
  function startKeepAlive(){ if(IS_IOS||!synth) return; stopKeepAlive(); keepAlive=setInterval(()=>{ if(S.playing&&!S.paused){ try{ synth.pause(); synth.resume(); }catch(e){} } }, 10000); }
  function stopKeepAlive(){ if(keepAlive){ clearInterval(keepAlive); keepAlive=null; } }

  function startFrom(i){
    if(synth) synth.cancel();
    NE.run++; if(NE.src){ try{ NE.src.stop(); }catch(e){} NE.src=null; }
    S.idx=i; S.playing=true; S.paused=false; updateControls(); announce("Reading");
    if(S.mode==="neural"){ speakNeuralFrom(i); }
    else { startKeepAlive(); speakNext(); }
  }

  function speakNext(){
    const item=S.queue[S.idx];
    if(!item){ finishReading(); return; }
    highlight(item);
    if(S.docKey) saveSet(S.docKey, String(S.idx));
    const u=new SpeechSynthesisUtterance(item.spoken);
    u.rate=S.rate; u.pitch=1;
    if(S.voice){ u.voice=S.voice; u.lang=S.voice.lang; }
    u.onend=()=>{ if(!S.playing||u!==S.utter) return; S.idx++; if(S.idx<S.queue.length) speakNext(); else finishReading(); };
    u.onerror=()=>{ if(!S.playing||u!==S.utter) return; S.idx++; if(S.idx<S.queue.length) speakNext(); else finishReading(); };
    S.utter=u; synth.speak(u);
  }

  function togglePlay(){
    if(!S.queue.length) return;
    if(!S.playing){ startFrom(Math.min(S.idx,S.queue.length-1)); return; }
    if(S.mode==="neural"){
      if(S.paused){ if(NE.ctx) NE.ctx.resume(); S.paused=false; } else { if(NE.ctx) NE.ctx.suspend(); S.paused=true; }
    } else {
      if(!synth) return;
      if(S.paused){ synth.resume(); S.paused=false; } else { synth.pause(); S.paused=true; }
    }
    updateControls(); announce(S.paused?"Paused":"Resumed");
  }
  function stopReading(){
    S.playing=false; S.paused=false; S.utter=null;
    if(synth) synth.cancel();
    NE.run++; if(NE.src){ try{ NE.src.stop(); }catch(e){} NE.src=null; } if(NE.ctx && NE.ctx.state==="running"){ try{ NE.ctx.suspend(); }catch(e){} }
    stopKeepAlive(); clearHighlight(); updateControls();
  }
  function finishReading(){ S.playing=false; S.paused=false; S.utter=null; S.idx=0; stopKeepAlive(); clearHighlight(); if(S.docKey) saveSet(S.docKey, null); updateControls(); announce("Finished reading"); }

  function clearHighlight(){ S.curBoxes.forEach(b=>b.remove()); S.curBoxes=[]; }
  function highlight(item){
    clearHighlight();
    const ov=item.page.overlay;
    const sx=(item.page.logicalW>0)?(ov.offsetWidth/item.page.logicalW):1;
    const sy=(item.page.logicalH>0)?(ov.offsetHeight/item.page.logicalH):1;
    item.rects.forEach(r=>{
      const d=document.createElement("div"); d.className="hl";
      d.style.left=(r.x*sx)+"px"; d.style.top=(r.y*sy)+"px"; d.style.width=(r.w*sx)+"px"; d.style.height=(r.h*sy)+"px";
      ov.appendChild(d); S.curBoxes.push(d);
    });
    const first=S.curBoxes[0];
    if(first){ const rect=first.getBoundingClientRect(); const vh=window.innerHeight; if(rect.top<70||rect.bottom>vh-46){ first.scrollIntoView({behavior:"smooth",block:"center"}); } }
  }

  function updateControls(){
    const ready=S.queue.length>0;
    els.play.disabled=!ready; els.stop.disabled=!ready||!S.playing;
    els.play.querySelector("i").className="ic "+((S.playing&&!S.paused)?"ic-pause":"ic-play");
    els.playlbl.textContent=!S.playing?"Play":(S.paused?"Resume":"Pause");
    els.play.setAttribute("aria-label", els.playlbl.textContent);
  }

  els.play.addEventListener("click", togglePlay);
  els.stop.addEventListener("click", ()=>{ stopReading(); announce("Stopped"); });
  if(els.mode){ els.mode.addEventListener("click", toggleMode); setModeUI(); }
  document.addEventListener("keydown", e=>{ if(e.code==="Space" && !/^(INPUT|SELECT|TEXTAREA|BUTTON)$/.test(document.activeElement.tagName)){ if(S.queue.length){ e.preventDefault(); togglePlay(); } } });

  let hintEl;
  function showHint(){
    if(hintEl) return;
    hintEl=document.createElement("div"); hintEl.className="hint";
    hintEl.innerHTML='Tap anywhere on the page to start. Tap again to jump.';
    document.body.appendChild(hintEl);
    setTimeout(()=>{ if(hintEl){hintEl.remove(); hintEl=null;} },6000);
  }

  // ---------------- Neural voice (Kokoro, on-device) ----------------
  function neuralBanner(show,msg){
    let b=document.getElementById("neuralbar");
    if(show){
      if(!b){ b=document.createElement("div"); b.id="neuralbar"; b.className="neuralbar"; b.innerHTML='<span class="dot"></span><span id="neuralmsg"></span>'; document.body.appendChild(b); }
      const m=document.getElementById("neuralmsg"); if(m) m.textContent=msg||"Loading natural voice..."; b.style.display="flex";
    } else if(b){ b.style.display="none"; }
  }
  async function loadNeural(){
    if(NE.tts) return NE.tts;
    if(NE.loading) return null;
    NE.loading=true; neuralBanner(true,"Preparing natural voice engine...");
    try{
      const gpu=await detectWebGPU();
      const KokoroTTS=await importKokoro();
      NE.tts=await KokoroTTS.from_pretrained("onnx-community/Kokoro-82M-v1.0-ONNX",{
        dtype: gpu ? "fp32" : "q8",
        device: gpu ? "webgpu" : "wasm",
        progress_callback:(p)=>{
          if(p && p.status==="progress" && p.total){ neuralBanner(true,"Downloading voice model "+Math.round((p.loaded/p.total)*100)+"%"); }
          else if(p && (p.status==="ready"||p.status==="done")){ neuralBanner(true,"Starting natural voice..."); }
        }
      });
      populateNeuralVoices(); neuralBanner(false); return NE.tts;
    } finally { NE.loading=false; }
  }
  function prettyVoice(id){
    const acc=id[0]==="a"?"US":id[0]==="b"?"UK":id[0];
    const gen=id[1]==="f"?"female":id[1]==="m"?"male":"";
    const name=(id.split("_")[1]||id);
    return name.charAt(0).toUpperCase()+name.slice(1)+" ("+acc+(gen?" "+gen:"")+")";
  }
  function populateNeuralVoices(){
    let ids=[];
    try{ const v=NE.tts.list_voices?NE.tts.list_voices():(NE.tts.voices||{}); ids=Array.isArray(v)?v:Object.keys(v); }catch(e){ ids=[]; }
    if(!ids.length) ids=["af_heart","af_bella","af_nicole","am_michael","am_fenrir","bf_emma","bm_george"];
    ids.sort((a,b)=> (a[0]<b[0]?-1:a[0]>b[0]?1:0) || a.localeCompare(b));
    els.voice.innerHTML="";
    ids.forEach(id=>{ const o=document.createElement("option"); o.value=id; o.textContent=prettyVoice(id); els.voice.appendChild(o); });
    const _nv=getSet("ra_nvoice");
    S.neuralVoice = (_nv && ids.indexOf(_nv)>=0) ? _nv : (ids.indexOf("af_heart")>=0 ? "af_heart" : ids[0]);
    els.voice.value=S.neuralVoice;
  }
  async function speakNeuralFrom(startIdx){
    NE.run++; const runId=NE.run;
    if(NE.src){ try{ NE.src.stop(); }catch(e){} NE.src=null; }   // stop any buffer still playing so speed/voice changes never overlap
    if(!NE.tts){ toast("Natural voice is not loaded."); return; }
    if(!NE.ctx){ try{ NE.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ toast("Audio is unavailable."); return; } }
    if(NE.ctx.state==="suspended"){ try{ await NE.ctx.resume(); }catch(e){} }
    const results={}, waiters={}; const LOOK=2;
    const resultOf=(i)=> results[i]!==undefined ? Promise.resolve(results[i]) : new Promise(res=>{ (waiters[i]=waiters[i]||[]).push(res); });
    (async ()=>{
      let g=startIdx;
      while(runId===NE.run && g<S.queue.length){
        if(g > NE.playIdx + LOOK){ await sleep(40); continue; }
        let pcm=new Float32Array(0), sr=24000;
        try{
          const out=await NE.tts.generate(S.queue[g].spoken,{ voice:S.neuralVoice||"af_heart", speed:S.rate });
          let a = out && (out.audio!==undefined?out.audio:(out.data!==undefined?out.data:out));
          if(a && typeof a.getChannelData==="function") a=a.getChannelData(0);
          if(a && !(a instanceof Float32Array)) a=Float32Array.from(a);
          pcm=a||pcm; sr=(out&&(out.sampling_rate||out.sample_rate))||sr;
        }catch(e){ console.error("neural generation failed",e); }
        if(runId!==NE.run) return;
        results[g]={pcm,sr}; (waiters[g]||[]).forEach(r=>r(results[g])); delete waiters[g];
        g++;
      }
    })();
    NE.playIdx=startIdx;
    while(runId===NE.run && NE.playIdx<S.queue.length){
      const r=await resultOf(NE.playIdx);
      if(runId!==NE.run) break;
      highlight(S.queue[NE.playIdx]);
      if(S.docKey) saveSet(S.docKey, String(NE.playIdx));
      await playPCM(r.pcm, r.sr, runId);
      if(runId!==NE.run) break;
      delete results[NE.playIdx];   // release the played chunk
      NE.playIdx++;
    }
    if(runId===NE.run) finishReading();
  }
  function playPCM(pcm,sr,runId){
    return new Promise(resolve=>{
      if(runId!==NE.run || !pcm || !pcm.length){ resolve(); return; }
      let buf;
      try{ buf=NE.ctx.createBuffer(1,pcm.length,sr); buf.getChannelData(0).set(pcm); }catch(e){ resolve(); return; }
      const src=NE.ctx.createBufferSource(); src.buffer=buf; src.connect(NE.ctx.destination); NE.src=src;
      src.onended=()=>{ if(NE.src===src) NE.src=null; resolve(); };
      try{ src.start(); }catch(e){ resolve(); }
    });
  }
  function setModeUI(){
    if(!els.mode) return;
    els.mode.textContent = S.mode==="neural" ? "Voice: Natural" : "Voice: System";
    els.mode.classList.toggle("on", S.mode==="neural");
    els.mode.setAttribute("aria-pressed", S.mode==="neural"?"true":"false");
  }
  async function toggleMode(){
    if(S.mode==="system"){
      stopReading();
      const ok=await loadNeural().catch(e=>{ console.error(e); return null; });
      if(ok){ S.mode="neural"; }
      else { toast("Could not load the natural voice. Staying on the system voice."); neuralBanner(false); loadVoices(); }
    } else {
      stopReading(); S.mode="system"; loadVoices();
    }
    setModeUI(); announce(S.mode==="neural"?"Natural voice selected":"System voice selected");
  }

  function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
  window.addEventListener("pagehide", ()=>{ if(S.docKey && S.playing) saveSet(S.docKey, String(S.mode==="neural"?NE.playIdx:S.idx)); });
  window.addEventListener("pagehide", ()=>{ if(synth) synth.cancel(); });
};

</script>

  var lib = window.pdfjsLib;
  if(!lib){ var s=document.getElementById("stage"); if(s){ s.innerHTML='<div class="drop"><h1>Engine failed to load</h1><p>The PDF engine did not initialize. Reinstall the app and try again.</p></div>'; } return; }
  try{ if(lib.GlobalWorkerOptions){ lib.GlobalWorkerOptions.workerSrc = "pdf.worker.min.js"; } }catch(e){}   // render in the PDF.js worker (off the main thread); falls back to the main-thread handler if the worker cannot load
  window.__startApp();
})();
</script>
